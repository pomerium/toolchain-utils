name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      llvm-version:
        description: "LLVM version (without the v; e.g. 'X.Y.Z')"
      release-name:
        description: "Release name"

jobs:
  package:
    runs-on:
      - ubuntu-latest-4-cores-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y tar xz-utils zstd gpg wget
          wget https://releases.llvm.org/release-keys.asc
          gpg --import release-keys.asc

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          platforms: linux/amd64,linux/arm64

      - name: Build archives
        run: |
          mkdir build
          cd build
          ../build_sysroot.sh
          LLVM_VERSION=${{ github.event.inputs.llvm-version }} ../build_toolchain_pkgs.sh

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.event.inputs.release-name }} --generate-notes ./build/*.tar.zst
