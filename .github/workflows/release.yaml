name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      llvm-version:
        description: "LLVM version (without the v; e.g. 'X.Y.Z')"
      release-name:
        description: "Release name"

jobs:
  package:
    runs-on:
      - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y tar xz-utils zstd gpg wget
          wget https://releases.llvm.org/release-keys.asc
          gpg --import release-keys.asc

      - name: Build archives
        run: |
          mkdir build
          cd build
          LLVM_VERSION=${{ github.event.inputs.llvm-version }} ../build.sh

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.event.inputs.release-name }} --generate-notes ./build/*.tar.zst
